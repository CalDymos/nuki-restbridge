; ── Native unit test environment ─────────────────────────────────────────────
; Runs pure-logic tests (no ESP32 hardware required):
;   pio test -e native
;
; Covered:
;   - util/CryptoUtils.h  (modInverse, encryptKeypadCode, decryptKeypadCode)
;   - util/AuthUtils.h    (constTimeStrEqual)
;
; Not covered natively (require hardware or stubs):
;   - BLE stack, NVS/Preferences, esp_fill_random, gettimeofday
[env:native]
platform = native
framework =
test_framework = unity
test_build_src = no
test_filter = native/*
lib_deps =
lib_ignore =
    NimBLE-Arduino
build_flags =
    -std=c++17
    -Isrc