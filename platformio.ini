; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = ol-poe-wr
boards_dir = boards
platforms_dir = .plt
packages_dir  = .pkg

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.35/platform-espressif32.zip
platform_packages = 
    platformio/tool-mklittlefs

upload_port = COM3
upload_speed =  921600
monitor_speed = 115200
framework = arduino, espidf
build_type = release
custom_build = release

extra_scripts =
    pre:pio_package_pre.py
    post:pio_package_post.py

board_build.partitions = partitions.csv

build_unflags =
    -DCONFIG_BT_NIMBLE_LOG_LEVEL
    -DCONFIG_BTDM_BLE_SCAN_DUPL
    -DESP32
    -Werror=all
    -Wall

build_flags =
    -fexceptions
    -DESP_PLATFORM
    -DESP32
    -DARDUINO_ARCH_ESP32
    -DUSE_ESP_IDF_LOG
    -DCONFIG_BTDM_BLE_SCAN_DUPL=y
    -DBLESCANNER_USE_LATEST_NIMBLE    
    -DNUKI_USE_LATEST_NIMBLE
    -DNUKI_NO_WDT_RESET
    -DNUKI_64BIT_TIME
    -DCORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_NONE
    -DCONFIG_LITTLEFS_FOR_IDF_3_2
    -DHTTPCLIENT_NOSECURE
    -Wno-unused-result
    -Wno-ignored-qualifiers
    -Wno-missing-field-initializers
    -I.pkg/framework-arduinoespressif32-libs/esp32/include/mbedtls/esp_crt_bundle/include

custom_component_remove =
    espressif/esp_hosted
    espressif/esp_wifi_remote
    espressif/esp_rainmaker
    espressif/rmaker_common
    espressif/esp_insights
    espressif/esp_diag_data_store
    espressif/esp_diagnostics
    espressif/esp-cbor
    espressif/esp-sr
    espressif/esp32-camera
    chmorgan/esp-libhelix-mp3
    espressif/eppp_link
    espressif/esp_modem
    espressif/esp_serial_slave_link
    espressif/esp-dsp
    espressif/esp-modbus
    espressif/network_provisioning
    espressif/esp-zboss-lib
    espressif/esp-zigbee-lib
    espressif/qrcode

lib_ignore =
    BLE
    BluetoothSerial
    SimpleBLE
    WiFiProv
    AsyncTCP
    ESPAsyncWebServer
    ESPAsyncTCP
    ESPAsyncTCP-esphome
    AsyncTCP_RP2040W
    RPAsyncTCP
    
lib_deps =
    BleScanner=symlink://lib/BleScanner
    NukiBleEsp32=symlink://lib/NukiBleEsp32
    NimBLE-Arduino=symlink://lib/NimBLE-Arduino

board_build.cmake_extra_args =
    -DCMAKE_C_USE_RESPONSE_FILE_FOR_OBJECTS=1
    -DCMAKE_CXX_USE_RESPONSE_FILE_FOR_OBJECTS=1
    -DCMAKE_C_USE_RESPONSE_FILE_FOR_LIBRARIES=1
    -DCMAKE_CXX_USE_RESPONSE_FILE_FOR_LIBRARIES=1

[env:ol-poe-wr]
extends = env
board = olimex-esp32-poe-iso-wroom
board_build.filesystem = littlefs
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.release.defaults;sdkconfig.defaults.esp32-nopsram"

; Ethernet-Configuration
build_flags =
    ${env.build_flags}

[env:ol-poe-wr_dbg]
extends = env:ol-poe-wr
board = olimex-esp32-poe-iso-wroom
custom_build = debug
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.debug.defaults;sdkconfig.defaults.esp32-nopsram"

; Ethernet-Configuration
build_flags =
    ${env:ol-poe-wr.build_flags}
    -DCORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_DEBUG
    -DCONFIG_NIMBLE_CPP_LOG_LEVEL=0
    -DCONFIG_BT_NIMBLE_LOG_LEVEL=0
    -DDEBUG_NUKIBRIDGE    

[env:ol-poe-wv]
extends = env
board = olimex-esp32-poe-iso-wrover
board_build.filesystem = littlefs
board_build.cmake_extra_args =
